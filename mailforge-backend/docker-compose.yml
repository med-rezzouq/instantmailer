services:

  api:
    build: .
    container_name: mailforge-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app
    networks:
      - mailforge-net

  db:
    image: postgres:16-alpine
    container_name: mailforge-db
    environment:
      POSTGRES_DB: mailforge
      POSTGRES_USER: mailforge
      POSTGRES_PASSWORD: mailforge_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mailforge-net

  redis:
    image: redis:7-alpine
    container_name: mailforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - mailforge-net

  pgadmin:
    image: dpage/pgadmin4
    container_name: mailforge-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mailforge.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - mailforge-net

networks:
  mailforge-net:
    driver: bridge

volumes:
  postgres_data: